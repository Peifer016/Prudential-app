<aside class="hidden md:flex flex-col w-24 bg-white border-r border-gray-200 h-full py-6">
  <div 
    routerLink="/clientes"
    routerLinkActive="border-[#0070c0] text-[#0070c0]"
    [routerLinkActiveOptions]="{exact: false}"
    class="flex flex-col items-center gap-1 border-l-4 border-transparent text-gray-400 py-4 cursor-pointer transition-all hover:text-[#0070c0]"
  >
    <i class="fa-solid fa-briefcase text-2xl"></i>
    <span class="text-[10px] font-bold uppercase">Clientes</span>
  </div>

  <div 
    routerLink="/valor-cuota"
    routerLinkActive="border-[#0070c0] text-[#0070c0]"
    class="flex flex-col items-center gap-1 border-l-4 border-transparent text-gray-400 py-4 cursor-pointer transition-all hover:text-[#0070c0]"
  >
    <i class="fa-solid fa-chart-line text-2xl"></i>
    <span class="text-[10px] font-bold uppercase text-center">Valor Cuota</span>
  </div>
</aside>
