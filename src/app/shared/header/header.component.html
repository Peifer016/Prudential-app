<header
  class="bg-[#0070c0] text-white h-16 w-full flex items-center justify-between px-6 shadow-md relative z-[100]"
>
  <!-- Logo desktop -->
  <div class="hidden md:flex items-center gap-3 select-none">
    <img src="/assets/icons/prudential.png" class="h-10 w-auto object-contain" alt="Prudential" />

    <div class="flex items-baseline gap-1">
      <span class="text-xl font-bold tracking-tight font-sans">Prudential</span>
      <span class="text-[10px] font-light tracking-[0.2em] opacity-90 ml-0.5">SAF</span>
    </div>
  </div>

  <!-- Botón menú móvil -->
  <button (click)="toggleMenu()" class="md:hidden text-2xl p-2 active:bg-white/10 rounded">
    <i class="fa-solid" [class.fa-xmark]="isMenuOpen" [class.fa-bars]="!isMenuOpen"></i>
  </button>

  <!-- Avatar móvil -->
  <div class="md:hidden">
    <div
      class="w-10 h-10 bg-white rounded-full flex items-center justify-center border border-white/20"
    >
      <span class="text-[#0070c0] font-bold italic text-lg">P</span>
    </div>
  </div>

  <!-- Info usuario desktop -->
  <div class="hidden md:flex items-center gap-4">
    <div class="text-right leading-none">
      <div class="font-semibold text-[13px] tracking-wide">Juan Alfaro</div>
      <div class="text-[9px] font-bold uppercase opacity-70 tracking-widest mt-1">Asesor</div>
    </div>
    <div class="flex items-center gap-2">
      <div
        class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center border border-white/30"
      >
        <i class="fa-solid fa-user text-lg"></i>
      </div>
      <i class="fa-solid fa-chevron-down text-[9px] opacity-60"></i>
    </div>
  </div>

  <!-- Menú móvil desplegable -->
  @if (isMenuOpen) {
    <div
      class="fixed top-16 left-0 w-full bg-white shadow-2xl z-[110] border-b border-gray-100 md:hidden overflow-y-auto max-h-[calc(100vh-64px)]"
    >
      <nav class="flex flex-col">
        <!-- Clientes con submenú -->
        <div class="border-b border-gray-100">
          <div
            (click)="toggleClientesSubmenu($event)"
            class="flex items-center justify-between px-6 py-4 text-gray-700 cursor-pointer hover:bg-gray-50"
          >
            <div class="flex items-center gap-4">
              <i class="fa-solid fa-briefcase text-lg"></i>
              <span class="font-bold uppercase text-[12px] tracking-widest">Clientes</span>
            </div>
            <i
              class="fa-solid fa-chevron-down text-xs transition-transform"
              [class.rotate-180]="isClientesSubmenuOpen"
            ></i>
          </div>

          <!-- Submenú de clientes -->
          @if (isClientesSubmenuOpen) {
            <div class="bg-gray-50 pl-12">
              <a
                [routerLink]="['/clientes/listado']"
                (click)="cerrarMenu()"
                routerLinkActive="active"
                class="flex items-center gap-3 px-6 py-3 text-gray-500 text-[11px] uppercase tracking-wider hover:text-[#0070c0] border-l-2 border-transparent hover:border-[#0070c0]"
              >
                <i class="fa-solid fa-list text-xs"></i>
                <span>Listado</span>
              </a>

              <a
                [routerLink]="['/clientes/fondos']"
                (click)="cerrarMenu()"
                routerLinkActive="active"
                class="flex items-center gap-3 px-6 py-3 text-gray-500 text-[11px] uppercase tracking-wider hover:text-[#0070c0] border-l-2 border-transparent hover:border-[#0070c0]"
              >
                <i class="fa-solid fa-building-columns text-xs"></i>
                <span>Fondos</span>
              </a>
            </div>
          }
        </div>

        <!-- Valor Cuota -->
        <a
          [routerLink]="['/valor-cuota']"
          (click)="cerrarMenu()"
          routerLinkActive="active"
          class="flex items-center gap-4 px-6 py-4 text-gray-600 hover:text-[#0070c0] border-l-[6px] border-transparent hover:border-[#0070c0] hover:bg-blue-50/50 transition-all cursor-pointer"
        >
          <i class="fa-solid fa-chart-line text-lg"></i>
          <span class="font-bold uppercase text-[12px] tracking-widest">Valor Cuota</span>
        </a>
      </nav>
    </div>

    <!-- Overlay -->
    <div (click)="cerrarMenu()" class="fixed inset-0 bg-black/30 z-[105] mt-16 md:hidden"></div>
  }
</header>
